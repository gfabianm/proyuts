<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="text-center mb-4">Iniciar sesión</h2>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Correo, contraseña incorrectos o usuario inactivo.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-info">
                        Sesión cerrada correctamente.
                    </div>

                    <div th:if="${param.registroExitoso}" class="alert alert-success">
                        Registro exitoso. Ahora puedes iniciar sesión.
                    </div>

                    <form method="post" th:action="@{/login}">

                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Ingresar</button>
                            <a th:href="@{/registro}" class="btn btn-outline-success">Crear cuenta</a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
