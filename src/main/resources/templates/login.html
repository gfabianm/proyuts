<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* TIPOGRAFÍA (usa Myriad Pro si está disponible) */
        @font-face {
            font-family: 'MyriadPro';
            src: url('/fonts/MyriadPro-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'MyriadPro', 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
        }

        .login-container {
            height: 100vh;
            display: flex;
        }

        /* LADO IZQUIERDO */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #8fae00, #C3D730);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        .left-panel p {
            margin-top: 20px;
            opacity: 0.95;
        }

        /* LADO DERECHO */
        .right-panel {
            flex: 1;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: #C3D730;
            box-shadow: 0 0 0 0.2rem rgba(195, 215, 48, 0.25);
        }

        .btn-custom {
            background: linear-gradient(135deg, #a6c800, #C3D730);
            border: none;
            border-radius: 25px;
            padding: 12px;
            color: #333;
            font-weight: bold;
        }

        .btn-custom:hover {
            opacity: 0.9;
        }

        .btn-outline-custom {
            border-radius: 25px;
            border-color: #C3D730;
            color: #6c8000;
        }

        .btn-outline-custom:hover {
            background-color: #C3D730;
            color: #333;
        }
    </style>
</head>

<body>

<div class="login-container">

    <!-- IZQUIERDA -->
    <div class="left-panel">
        <h1>PROYUTS<br>UTS</h1>
        <p>
            Plataforma académica para el seguimiento de estudiantes con alta precisión
            y análisis institucional.
        </p>
    </div>

    <!-- DERECHA -->
    <div class="right-panel">

        <div class="login-card">

            <h3 class="mb-4 text-center">Bienvenido de nuevo</h3>

            <div th:if="${param.error}" class="alert alert-danger">
                Correo o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="alert alert-info">
                Sesión cerrada correctamente.
            </div>

            <div th:if="${param.registroExitoso}" class="alert alert-success">
                Registro exitoso.
            </div>

            <form method="post" th:action="@{/login}">

                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Correo institucional" required>
                </div>

                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-custom">Iniciar sesión</button>
                </div>

                <div class="text-center">
                    <small>¿No tienes cuenta?</small><br>
                    <a th:href="@{/registro}" class="btn btn-outline-custom btn-sm mt-2">
                        Crear cuenta
                    </a>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
