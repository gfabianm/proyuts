<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Panel Profesor - PROYUTS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        @font-face { font-family:'MyriadPro'; src:url('/fonts/MyriadPro-Regular.woff') format('woff'); }

        body { margin:0; font-family:'MyriadPro','Segoe UI',sans-serif; background:#f4f6f9; }
        .app { display:flex; height:100vh; }

        /* SIDEBAR */
        .sidebar {
            width:230px;
            background:#fff;
            padding:20px;
            border-right:1px solid #eee;
        }

        .logo {
            font-weight:bold;
            color:#6c8000;
            margin-bottom:30px;
        }

        .menu a {
            display:block;
            padding:12px 15px;
            border-radius:12px;
            color:#555;
            text-decoration:none;
            margin-bottom:6px;
            transition:.3s;
            font-weight:700;
        }

        .menu a i { margin-right:8px; }

        .menu a:hover, .menu a.active {
            background:#C3D730;
            color:#1f2a00;
        }

        .menu-section {
            font-size:.68rem;
            font-weight:800;
            text-transform:uppercase;
            letter-spacing:.1em;
            color:#bbb;
            padding:8px 15px 2px;
        }

        .logout-btn {
            display:block;
            text-align:center;
            margin-top:16px;
            padding:12px;
            border-radius:12px;
            background:#dc3545;
            color:#fff;
            text-decoration:none;
            font-weight:bold;
        }

        .logout-btn:hover {
            background:#b02a37;
            color:#fff;
        }

        /* CONTENT */
        .content {
            flex:1;
            padding:30px;
            overflow-y:auto;
        }

        .card-custom {
            background:#fff;
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 25px rgba(0,0,0,.05);
        }

        .stat-card {
            background:#C3D730;
            border-radius:15px;
            padding:20px;
            color:#1f2a00;
            text-align:center;
        }

        thead {
            background:#C3D730;
            color:#1f2a00;
        }

        tbody tr:hover {
            background:#f9fbec;
        }

        .btn-main {
            background:linear-gradient(135deg,#a6c800,#C3D730);
            border:none;
            border-radius:20px;
            font-weight:bold;
            color:#333;
        }
    </style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">PROYUTS UTS</div>

        <div class="menu">

            <a th:href="@{/}" ><i class="bi bi-house"></i> Dashboard</a>
            <a th:href="@{/web/cursos}"><i class="bi bi-book"></i> Cursos</a>
            <a th:href="@{/estadisticas}"><i class="bi bi-bar-chart"></i> Estadísticas</a>
            <a th:href="@{/perfil}"><i class="bi bi-person"></i> Perfil</a>

            <!-- PROFESOR -->
            <div sec:authorize="hasRole('PROFESOR')">
                <div class="menu-section">Docente</div>
                <a th:href="@{/profesor/panel}" class="active">
                    <i class="bi bi-cast"></i> Mi panel
                </a>
            </div>

        </div>

        <hr>
        <a th:href="@{/logout}" class="logout-btn">Cerrar sesión</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Panel del Profesor</h1>
        </div>

        <!-- BIENVENIDA -->
        <div class="card-custom mb-4">
            Bienvenido profesor:
            <strong th:text="${profesor.nombre + ' ' + profesor.apellido}"></strong>
        </div>

        <!-- STATS -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Cursos asignados</h5>
                    <p class="fs-2 fw-bold" th:text="${totalCursos}"></p>
                </div>
            </div>
        </div>

        <!-- SIN CURSOS -->
        <div th:if="${#lists.isEmpty(cursos)}" class="alert alert-info">
            Actualmente no tienes cursos asignados.
        </div>

        <!-- TABLA -->
        <div th:if="${!#lists.isEmpty(cursos)}" class="card-custom">

            <h4 class="mb-3">Mis cursos asignados</h4>

            <div class="table-responsive">
                <table class="table align-middle">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Curso</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Cupo máximo</th>
                        <th>PROYUTS</th>
                        <th>Fecha creación</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="curso : ${cursos}">
                        <td th:text="${curso.id}"></td>
                        <td th:text="${curso.nombre}"></td>
                        <td th:text="${curso.descripcion}"></td>
                        <td th:text="${curso.categoria.nombre}"></td>
                        <td th:text="${curso.estado.nombre}"></td>
                        <td th:text="${curso.cupoMaximo}"></td>
                        <td th:text="${curso.proyutsOtorgados}"></td>
                        <td th:text="${curso.fechaCreacion}"></td>
                        <td>
                            <a th:href="@{'/profesor/curso/' + ${curso.id} + '/estudiantes'}"
                               class="btn btn-sm btn-main">
                                <i class="bi bi-people"></i> Ver
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>

</div>

</body>
</html>
