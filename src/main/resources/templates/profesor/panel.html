<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Panel Profesor - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Panel del Profesor</h1>
        <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
    </div>

    <div class="alert alert-warning">
        Bienvenido profesor:
        <strong th:text="${profesor.nombre + ' ' + profesor.apellido}"></strong>
    </div>

    <div class="row g-3 mb-4">

        <div class="col-md-4">
            <div class="card text-bg-primary shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Cursos asignados</h5>
                    <p class="fs-2 mb-0" th:text="${totalCursos}"></p>
                </div>
            </div>
        </div>

    </div>

    <div th:if="${#lists.isEmpty(cursos)}" class="alert alert-info">
        Actualmente no tienes cursos asignados.
    </div>

    <div th:if="${!#lists.isEmpty(cursos)}" class="card shadow-sm">
        <div class="card-body">

            <h4 class="mb-3">Mis cursos asignados</h4>

            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Curso</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Cupo máximo</th>
                        <th>PROYUTS</th>
                        <th>Fecha creación</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="curso : ${cursos}">
                        <td th:text="${curso.id}"></td>
                        <td th:text="${curso.nombre}"></td>
                        <td th:text="${curso.descripcion}"></td>
                        <td th:text="${curso.categoria.nombre}"></td>
                        <td th:text="${curso.estado.nombre}"></td>
                        <td th:text="${curso.cupoMaximo}"></td>
                        <td th:text="${curso.proyutsOtorgados}"></td>
                        <td th:text="${curso.fechaCreacion}"></td>
                        <td>
                            <a th:href="@{'/profesor/curso/' + ${curso.id} + '/estudiantes'}"
                               class="btn btn-sm btn-primary">
                                Ver estudiantes
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
