<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Estudiantes del Curso - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Estudiantes inscritos</h1>
        <a th:href="@{/profesor/panel}" class="btn btn-secondary">Volver al panel</a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <h4 th:text="${curso.nombre}"></h4>

            <p class="mb-1">
                Profesor:
                <strong th:text="${profesor.nombre + ' ' + profesor.apellido}"></strong>
            </p>

            <p class="mb-1">
                Categoría:
                <strong th:text="${curso.categoria.nombre}"></strong>
            </p>

            <p class="mb-1">
                Estado:
                <strong th:text="${curso.estado.nombre}"></strong>
            </p>

            <p class="mb-0">
                Total estudiantes inscritos:
                <strong th:text="${totalEstudiantes}"></strong>
            </p>

        </div>
    </div>

    <div th:if="${#lists.isEmpty(estudiantes)}" class="alert alert-info">
        Este curso todavía no tiene estudiantes inscritos.
    </div>

    <div th:if="${!#lists.isEmpty(estudiantes)}" class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre completo</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Programa académico</th>
                        <th>Estado</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="estudiante : ${estudiantes}">
                        <td th:text="${estudiante.id}"></td>
                        <td th:text="${estudiante.nombre + ' ' + estudiante.apellido}"></td>
                        <td th:text="${estudiante.email}"></td>
                        <td th:text="${estudiante.telefono}"></td>
                        <td th:text="${estudiante.programaAcademico}"></td>
                        <td>
                            <span th:if="${estudiante.activo}" class="badge bg-success">Activo</span>
                            <span th:unless="${estudiante.activo}" class="badge bg-danger">Inactivo</span>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
