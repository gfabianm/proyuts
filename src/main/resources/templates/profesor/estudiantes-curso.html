<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Estudiantes del Curso - PROYUTS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'MyriadPro';
            src: url('/fonts/MyriadPro-Regular.woff') format('woff');
        }

        body {
            margin: 0;
            font-family: 'MyriadPro', 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        .container-custom {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        .card-custom {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* ENCABEZADO TABLA */
        thead {
            background: #C3D730;
            color: #1f2a00;
        }

        tbody tr:hover {
            background: #f9fbec;
        }

        /* BADGES */
        .badge-activo {
            background: #28a745;
        }

        .badge-inactivo {
            background: #dc3545;
        }

    </style>
</head>

<body>

<div class="container-custom">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">Estudiantes inscritos</h1>

        <!-- Botón volver dinámico -->
        <button onclick="window.history.back();" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Volver
        </button>
    </div>

    <!-- INFO DEL CURSO -->
    <div class="card-custom mb-4">

        <h4 class="fw-bold mb-3" th:text="${curso.nombre}"></h4>

        <div class="row">
            <div class="col-md-6">
                <p>
                    Profesor: 
                    <strong th:text="${profesor.nombre + ' ' + profesor.apellido}"></strong>
                </p>

                <p>
                    Categoría: 
                    <strong th:text="${curso.categoria.nombre}"></strong>
                </p>
            </div>

            <div class="col-md-6">
                <p>
                    Estado: 
                    <strong th:text="${curso.estado.nombre}"></strong>
                </p>

                <p>
                    Total estudiantes: 
                    <strong th:text="${totalEstudiantes}"></strong>
                </p>
            </div>
        </div>

    </div>

    <!-- SIN ESTUDIANTES -->
    <div th:if="${#lists.isEmpty(estudiantes)}" class="alert alert-info">
        Este curso todavía no tiene estudiantes inscritos.
    </div>

    <!-- TABLA -->
    <div th:if="${!#lists.isEmpty(estudiantes)}" class="card-custom">

        <div class="table-responsive">
            <table class="table align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre completo</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Programa académico</th>
                        <th>Estado</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="estudiante : ${estudiantes}">
                        <td th:text="${estudiante.id}"></td>
                        <td th:text="${estudiante.nombre + ' ' + estudiante.apellido}"></td>
                        <td th:text="${estudiante.email}"></td>
                        <td th:text="${estudiante.telefono}"></td>
                        <td th:text="${estudiante.programaAcademico}"></td>
                        <td>
                            <span th:if="${estudiante.activo}" class="badge badge-activo">Activo</span>
                            <span th:unless="${estudiante.activo}" class="badge badge-inactivo">Inactivo</span>
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>
