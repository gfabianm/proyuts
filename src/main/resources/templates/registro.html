<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="text-center mb-4">Registro de Usuario</h2>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/registro}" th:object="${usuario}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text"
                                   th:field="*{nombre}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('nombre')}"
                                 th:errors="*{nombre}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text"
                                   th:field="*{apellido}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('apellido')}"
                                 th:errors="*{apellido}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text"
                                   th:field="*{telefono}"
                                   class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Programa académico</label>
                            <input type="text"
                                   th:field="*{programaAcademico}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('programaAcademico')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('programaAcademico')}"
                                 th:errors="*{programaAcademico}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Biografía</label>
                            <textarea th:field="*{biografia}"
                                      class="form-control"
                                      rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password"
                                   th:field="*{password}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password"
                                   name="confirmarPassword"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Registrarme</button>
                            <a th:href="@{/login}" class="btn btn-secondary">Volver al login</a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
