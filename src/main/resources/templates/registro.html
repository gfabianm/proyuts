<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'MyriadPro';
            src: url('/fonts/MyriadPro-Regular.woff') format('woff');
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'MyriadPro', 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
        }

        .container-main {
            display: flex;
            height: 100vh;
        }

        /* IZQUIERDA */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #a6c800, #C3D730);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-panel h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        /* DERECHA */
        .right-panel {
            flex: 1;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-card {
            width: 100%;
            max-width: 420px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            background: #f5f5f5;
            border: none;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(195, 215, 48, 0.25);
        }

        .btn-main {
            background: linear-gradient(135deg, #a6c800, #C3D730);
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: bold;
            color: #333;
        }

        .btn-main:hover {
            opacity: 0.9;
        }

        .small-text {
            font-size: 0.85rem;
            color: #777;
        }

        .link-login {
            color: #6c8000;
            text-decoration: none;
            font-weight: bold;
        }

        .link-login:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container-main">

    <!-- IZQUIERDA -->
    <div class="left-panel">
        <h1>CREA TU CUENTA</h1>
    </div>

    <!-- DERECHA -->
    <div class="right-panel">

        <div class="form-card">

            <h3 class="mb-2">Crear cuenta</h3>
            <p class="small-text mb-4">Ingresa tus datos para comenzar.</p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/registro}" th:object="${usuario}" method="post">

                <div class="mb-3">
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre">
                </div>

                <div class="mb-3">
                    <input type="text" th:field="*{apellido}" class="form-control" placeholder="Apellido">
                </div>

                <div class="mb-3">
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Correo electrónico">
                </div>

                <div class="mb-3">
                    <input type="text" th:field="*{telefono}" class="form-control" placeholder="Teléfono">
                </div>

                <div class="mb-3">
                    <input type="text" th:field="*{programaAcademico}" class="form-control" placeholder="Programa académico">
                </div>

                <div class="mb-3">
                    <textarea th:field="*{biografia}" class="form-control" rows="2" placeholder="Biografía (opcional)"></textarea>
                </div>

                <div class="mb-3">
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Contraseña">
                </div>

                <div class="mb-3">
                    <input type="password" name="confirmarPassword" class="form-control" placeholder="Confirmar contraseña">
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-main">
                        Crear mi cuenta →
                    </button>
                </div>

                <div class="text-center small-text">
                    ¿Ya tienes cuenta?
                    <a th:href="@{/login}" class="link-login">Iniciar sesión</a>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
