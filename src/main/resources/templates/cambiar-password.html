<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cambiar Contraseña - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="text-center mb-4">Cambiar Contraseña</h2>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/perfil/cambiar-password}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Contraseña actual</label>
                            <input type="password"
                                   name="passwordActual"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password"
                                   name="passwordNueva"
                                   class="form-control"
                                   minlength="6"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Confirmar nueva contraseña</label>
                            <input type="password"
                                   name="confirmarPasswordNueva"
                                   class="form-control"
                                   minlength="6"
                                   required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/perfil}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Guardar contraseña</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
