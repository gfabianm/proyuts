<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Formulario Curso - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="mb-4 text-center">Crear / Editar Curso</h2>

            <form th:action="@{/web/cursos/guardar}" th:object="${curso}" method="post">

                <!-- 🔥 IMPORTANTE -->
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cupo Máximo</label>
                    <input type="number" th:field="*{cupoMaximo}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">PROYUTS Otorgados</label>
                    <input type="number" th:field="*{proyutsOtorgados}" class="form-control" required>
                </div>

                <!-- 🔥 CATEGORIA -->
                <div class="mb-3">
                    <label class="form-label">Categoría</label>
                    <select th:field="*{categoria}" class="form-select" required>
                        <option value="">Seleccione...</option>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat}"
                                th:text="${cat.nombre}">
                        </option>
                    </select>
                </div>

                <!-- 🔥 ESTADO -->
                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select th:field="*{estado}" class="form-select" required>
                        <option value="">Seleccione...</option>
                        <option th:each="est : ${estados}"
                                th:value="${est}"
                                th:text="${est.nombre}">
                        </option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Fecha de Creación</label>
                    <input type="datetime-local" th:field="*{fechaCreacion}" class="form-control" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/web/cursos}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar Curso</button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
