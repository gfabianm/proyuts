<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Formulario Curso - PROYUTS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'MyriadPro';
            src: url('/fonts/MyriadPro-Regular.woff') format('woff');
        }

        body {
            margin: 0;
            font-family: 'MyriadPro', 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        .container-custom {
            max-width: 700px;
            margin: auto;
            padding: 50px 20px;
        }

        .form-card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
            color: #1f2a00;
        }

        /* INPUTS */
        .form-control, .form-select {
            border-radius: 12px;
            padding: 10px;
        }

        .form-control:focus, .form-select:focus {
            border-color: #C3D730;
            box-shadow: 0 0 0 0.2rem rgba(195,215,48,0.25);
        }

        /* BOTONES */
        .btn-main {
            background: linear-gradient(135deg, #a6c800, #C3D730);
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-weight: bold;
            color: #333;
        }

        .btn-main:hover {
            opacity: 0.9;
            color: #333;
        }

        .btn-cancel {
            border-radius: 25px;
        }

    </style>
</head>

<body>

<div class="container-custom">

    <div class="form-card">

        <h2>Crear / Editar Curso</h2>

        <form th:action="@{/web/cursos/guardar}" th:object="${curso}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text"
                       th:field="*{nombre}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{nombre}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea th:field="*{descripcion}"
                          class="form-control"
                          rows="3"
                          th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"></textarea>
                <div class="invalid-feedback" th:errors="*{descripcion}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Cupo Máximo</label>
                <input type="number"
                       th:field="*{cupoMaximo}"
                       class="form-control"
                       min="1"
                       th:classappend="${#fields.hasErrors('cupoMaximo')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{cupoMaximo}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">PROYUTS Otorgados</label>
                <input type="number"
                       th:field="*{proyutsOtorgados}"
                       class="form-control"
                       min="1"
                       th:classappend="${#fields.hasErrors('proyutsOtorgados')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{proyutsOtorgados}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select th:field="*{categoria}"
                        class="form-select"
                        th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'">
                    <option value="">Seleccione...</option>
                    <option th:each="cat : ${categorias}"
                            th:value="${cat.id}"
                            th:text="${cat.nombre}">
                    </option>
                </select>
                <div class="invalid-feedback" th:errors="*{categoria}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select th:field="*{estado}"
                        class="form-select"
                        th:classappend="${#fields.hasErrors('estado')} ? 'is-invalid'">
                    <option value="">Seleccione...</option>
                    <option th:each="est : ${estados}"
                            th:value="${est.id}"
                            th:text="${est.nombre}">
                    </option>
                </select>
                <div class="invalid-feedback" th:errors="*{estado}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Profesor asignado</label>
                <select th:field="*{profesor}" class="form-select">
                    <option value="">Sin profesor asignado</option>
                    <option th:each="profesor : ${profesores}"
                            th:value="${profesor.id}"
                            th:text="${profesor.nombre + ' ' + profesor.apellido}">
                    </option>
                </select>
            </div>

            <input type="hidden" th:field="*{fechaCreacion}">

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/web/cursos}" class="btn btn-outline-secondary btn-cancel">
                    Cancelar
                </a>

                <button type="submit" class="btn btn-main">
                    Guardar Curso
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
