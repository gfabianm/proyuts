<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Lista de Cursos - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="m-0">Lista de Cursos</h1>
        <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
    </div>

	<div class="mb-3">
	    <div sec:authorize="hasRole('ADMIN')">
	        <a th:href="@{/web/cursos/nuevo}" class="btn btn-success">Crear nuevo curso</a>
	    </div>
	</div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Cupo Máximo</th>
                        <th>PROYUTS Otorgados</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Fecha Creación</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="curso : ${cursos}">
                        <td th:text="${curso.id}"></td>
                        <td th:text="${curso.nombre}"></td>
                        <td th:text="${curso.descripcion}"></td>
                        <td th:text="${curso.cupoMaximo}"></td>
                        <td th:text="${curso.proyutsOtorgados}"></td>
                        <td th:text="${curso.categoria.nombre}"></td>
                        <td th:text="${curso.estado.nombre}"></td>
                        <td th:text="${curso.fechaCreacion}"></td>
						<td>
						    <div class="d-flex gap-1 flex-wrap">

						        <div sec:authorize="hasRole('ADMIN')">
						            <a th:href="@{'/web/cursos/editar/' + ${curso.id}}" class="btn btn-sm btn-warning">Editar</a>
						        </div>

						        <div sec:authorize="hasRole('ADMIN')">
						            <a th:href="@{'/web/cursos/eliminar/' + ${curso.id}}"
						               class="btn btn-sm btn-danger"
						               onclick="return confirm('¿Seguro que quieres eliminar este curso?')">
						                Eliminar
						            </a>
						        </div>

						        <div sec:authorize="hasRole('ESTUDIANTE')">
						            <a th:href="@{'/inscribirse/' + ${curso.id}}" class="btn btn-sm btn-success">
						                Inscribirme
						            </a>
						        </div>

						        <div sec:authorize="hasRole('PROFESOR')">
						            <span class="badge bg-info text-dark">Vista profesor</span>
						        </div>

						        <div sec:authorize="!hasAnyRole('ADMIN','ESTUDIANTE','PROFESOR')">
						            <span class="badge bg-secondary">Sin acciones</span>
						        </div>

						    </div>
						</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

</body>
</html>
