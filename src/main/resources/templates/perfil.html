<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Mi Perfil</h1>
        <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
    </div>

    <div th:if="${param.actualizado}" class="alert alert-success">Perfil actualizado correctamente.</div>
    <div th:if="${param.passwordActualizada}" class="alert alert-success">Contraseña actualizada correctamente.</div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="row">
                <div class="col-md-4 text-center border-end">
                    <img th:src="${fotoBase64 != null} ? 'data:image/jpeg;base64,' + ${fotoBase64} : 'https://via.placeholder.com/160'"
                 alt="Foto de perfil"
                 class="rounded-circle mb-3 shadow-sm"
                 width="160"
                 height="160"
                 style="object-fit: cover; background-color: #f8f9fa; border: 3px solid #dee2e6;">

                    <h4 th:text="${usuario.nombre + ' ' + usuario.apellido}"></h4>
                    <p class="text-muted mb-1" th:text="${usuario.email}"></p>

                    <span class="badge bg-success" th:if="${usuario.activo}">Activo</span>
                    <span class="badge bg-danger" th:unless="${usuario.activo}">Inactivo</span>
                </div>

                <div class="col-md-8">
                    <h4 class="mb-3">Información personal</h4>
                    <table class="table table-bordered">
                        <tbody>
                            <tr><th>Nombre</th><td th:text="${usuario.nombre}"></td></tr>
                            <tr><th>Apellido</th><td th:text="${usuario.apellido}"></td></tr>
                            <tr><th>Correo</th><td th:text="${usuario.email}"></td></tr>
                            <tr><th>Teléfono</th><td th:text="${usuario.telefono}"></td></tr>
                            <tr><th>Programa académico</th><td th:text="${usuario.programaAcademico}"></td></tr>
                            <tr><th>Biografía</th><td th:text="${usuario.biografia}"></td></tr>
                            <tr><th>Fecha de registro</th><td th:text="${usuario.fechaRegistro}"></td></tr>
                            <tr>
                                <th>Roles</th>
                                <td>
                                    <span th:each="rol : ${usuario.roles}" class="badge bg-primary me-1" th:text="${rol.nombre}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="mt-4 d-flex gap-2 flex-wrap">
                        <a th:href="@{/perfil/editar}" class="btn btn-warning">Editar perfil</a>
                        <a th:href="@{/perfil/cambiar-password}" class="btn btn-outline-danger">Cambiar contraseña</a>
                        <div sec:authorize="hasRole('ESTUDIANTE')">
                            <a th:href="@{/dashboard-estudiante}" class="btn btn-primary">Ir al dashboard</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
