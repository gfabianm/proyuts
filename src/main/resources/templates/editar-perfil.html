<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - PROYUTS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'MyriadPro';
            src: url('/fonts/MyriadPro-Regular.woff') format('woff');
        }

        body {
            margin: 0;
            font-family: 'MyriadPro', 'Segoe UI', Arial, sans-serif;
        }

        .container-fluid {
            height: 100vh;
        }

        /* LADO IZQUIERDO */
        .left-side {
            background: linear-gradient(135deg, #a6c800, #C3D730);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-side h1 {
            font-weight: bold;
            font-size: 2.5rem;
        }

        .left-side p {
            margin-top: 10px;
            opacity: 0.9;
        }

        /* LADO DERECHO */
        .right-side {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f9;
        }

        .form-container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-title {
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-main {
            background: linear-gradient(135deg, #a6c800, #C3D730);
            border: none;
            border-radius: 25px;
            padding: 10px;
            font-weight: bold;
            width: 100%;
        }

        .btn-main:hover {
            opacity: 0.9;
        }

        .btn-cancel {
            border-radius: 25px;
        }

        input, textarea {
            border-radius: 10px !important;
        }

    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row h-100">

        <!-- IZQUIERDA -->
        <div class="col-md-6 left-side">
            <h1>Editar Perfil</h1>
            <p>Actualiza tu información académica y personal en PROYUTS.</p>
        </div>

        <!-- DERECHA -->
        <div class="col-md-6 right-side">

            <div class="form-container">

                <h3 class="form-title">Actualizar datos</h3>

                <form th:action="@{/perfil/editar}" th:object="${usuario}" method="post" enctype="multipart/form-data">

                    <input type="hidden" th:field="*{id}">

                    <!-- FOTO -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Foto de perfil</label>
                        <input type="file" name="archivoImagen" class="form-control" accept="image/*">
                    </div>

                    <!-- NOMBRE -->
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control"
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{nombre}"></div>
                    </div>

                    <!-- APELLIDO -->
                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" th:field="*{apellido}" class="form-control"
                               th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{apellido}"></div>
                    </div>

                    <!-- CORREO -->
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" th:value="${usuario.email}" class="form-control" disabled>
                        <small class="text-muted">No editable</small>
                    </div>

                    <!-- TELEFONO -->
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" th:field="*{telefono}" class="form-control">
                    </div>

                    <!-- PROGRAMA -->
                    <div class="mb-3">
                        <label class="form-label">Programa académico</label>
                        <input type="text" th:field="*{programaAcademico}" class="form-control"
                               th:classappend="${#fields.hasErrors('programaAcademico')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{programaAcademico}"></div>
                    </div>

                    <!-- BIO -->
                    <div class="mb-3">
                        <label class="form-label">Biografía</label>
                        <textarea th:field="*{biografia}" class="form-control" rows="3"></textarea>
                    </div>

                    <!-- BOTONES -->
                    <div class="d-flex gap-2">
                        <a th:href="@{/perfil}" class="btn btn-outline-secondary w-50 btn-cancel">Cancelar</a>
                        <button type="submit" class="btn btn-main w-50">Guardar</button>
                    </div>

                </form>

            </div>

        </div>

    </div>
</div>

</body>
</html>
