<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - PROYUTS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        @font-face { font-family:'MyriadPro'; src:url('/fonts/MyriadPro-Regular.woff') format('woff'); }

        body { margin:0; font-family:'MyriadPro','Segoe UI',sans-serif; background:#f4f6f9; }
        .app { display:flex; height:100vh; }

        /* SIDEBAR */
        .sidebar {
            width:230px;
            background:#fff;
            padding:20px;
            border-right:1px solid #eee;
        }

        .logo {
            font-weight:bold;
            color:#6c8000;
            margin-bottom:30px;
        }

        .menu a {
            display:block;
            padding:12px 15px;
            border-radius:12px;
            color:#555;
            text-decoration:none;
            margin-bottom:6px;
            transition:.3s;
            font-weight:700;
        }

        .menu a i { margin-right:8px; }

        .menu a:hover, .menu a.active {
            background:#C3D730;
            color:#1f2a00;
        }

        .menu-section {
            font-size:.68rem;
            font-weight:800;
            text-transform:uppercase;
            letter-spacing:.1em;
            color:#bbb;
            padding:8px 15px 2px;
        }

        .logout-btn {
            display:block;
            text-align:center;
            margin-top:16px;
            padding:12px;
            border-radius:12px;
            background:#dc3545;
            color:#fff;
            text-decoration:none;
            font-weight:bold;
        }

        .logout-btn:hover {
            background:#b02a37;
            color:#fff;
        }

        /* CONTENT */
        .content {
            flex:1;
            padding:30px;
            overflow-y:auto;
            background:#f4f6f9;
        }

        .card-custom {
            background:#fff;
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 25px rgba(0,0,0,.05);
        }

        thead {
            background:#C3D730;
            color:#1f2a00;
        }

        tbody tr:hover {
            background:#f9fbec;
        }

        .btn-action {
            background:#ffc107;
            border:none;
            border-radius:20px;
            font-weight:bold;
        }

        .btn-action:hover {
            background:#e0a800;
        }

    </style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">PROYUTS UTS</div>

        <div class="menu">

            <a th:href="@{/}"><i class="bi bi-house"></i> Dashboard</a>
            <a th:href="@{/web/cursos}"><i class="bi bi-book"></i> Cursos</a>
            <a th:href="@{/estadisticas}"><i class="bi bi-bar-chart"></i> Estadísticas</a>
            <a th:href="@{/perfil}"><i class="bi bi-person"></i> Perfil</a>

            <!-- ADMIN -->
            <div sec:authorize="hasRole('ADMINISTRADOR')">
                <div class="menu-section">Administración</div>
                <a th:href="@{/admin/usuarios}" class="active">
                    <i class="bi bi-people"></i> Usuarios
                </a>
                <a th:href="@{/web/cursos/nuevo}">
                    <i class="bi bi-plus-circle"></i> Crear curso
                </a>
            </div>

        </div>

        <hr>
        <a th:href="@{/logout}" class="logout-btn">Cerrar sesión</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="card-custom">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="fw-bold">Gestión de Usuarios</h1>
            </div>

            <!-- SIN USUARIOS -->
            <div th:if="${#lists.isEmpty(usuarios)}" class="alert alert-warning">
                No hay usuarios registrados.
            </div>

            <!-- TABLA -->
            <div th:if="${!#lists.isEmpty(usuarios)}">

                <div class="table-responsive">
                    <table class="table align-middle">

                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Programa</th>
                            <th>Estado</th>
                            <th>Roles</th>
                            <th>Fecha registro</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="usuario : ${usuarios}">
                            <td th:text="${usuario.id}"></td>
                            <td th:text="${usuario.nombre + ' ' + usuario.apellido}"></td>
                            <td th:text="${usuario.email}"></td>
                            <td th:text="${usuario.programaAcademico}"></td>

                            <td>
                                <span th:if="${usuario.activo}" class="badge bg-success">Activo</span>
                                <span th:unless="${usuario.activo}" class="badge bg-danger">Inactivo</span>
                            </td>

                            <td>
                                <span th:each="rol : ${usuario.roles}"
                                      class="badge bg-primary me-1"
                                      th:text="${rol.nombre}">
                                </span>
                            </td>

                            <td th:text="${usuario.fechaRegistro}"></td>

                            <td>
                                <a th:href="@{'/admin/usuarios/cambiar-estado/' + ${usuario.id}}"
                                   class="btn btn-sm btn-action"
                                   onclick="return confirm('¿Seguro que deseas cambiar el estado de este usuario?')">
                                    Activar / Desactivar
                                </a>
                            </td>
                        </tr>
                        </tbody>

                    </table>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
