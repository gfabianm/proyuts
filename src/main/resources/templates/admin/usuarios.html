<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Gestión de Usuarios</h1>
        <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
    </div>

    <div th:if="${#lists.isEmpty(usuarios)}" class="alert alert-warning">
        No hay usuarios registrados.
    </div>

    <div th:if="${!#lists.isEmpty(usuarios)}" class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Programa</th>
                        <th>Estado</th>
                        <th>Roles</th>
                        <th>Fecha registro</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id}"></td>
                        <td th:text="${usuario.nombre + ' ' + usuario.apellido}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td th:text="${usuario.programaAcademico}"></td>

                        <td>
                            <span th:if="${usuario.activo}" class="badge bg-success">Activo</span>
                            <span th:unless="${usuario.activo}" class="badge bg-danger">Inactivo</span>
                        </td>

                        <td>
                            <span th:each="rol : ${usuario.roles}"
                                  class="badge bg-primary me-1"
                                  th:text="${rol.nombre}">
                            </span>
                        </td>

                        <td th:text="${usuario.fechaRegistro}"></td>

                        <td>
                            <a th:href="@{'/admin/usuarios/cambiar-estado/' + ${usuario.id}}"
                               class="btn btn-sm btn-warning"
                               onclick="return confirm('¿Seguro que deseas cambiar el estado de este usuario?')">
                                Activar / Desactivar
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
