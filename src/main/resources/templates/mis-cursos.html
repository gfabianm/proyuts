<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mis Cursos - PROYUTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Mis cursos inscritos</h1>
        <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
    </div>

    <div class="alert alert-info">
        Estudiante:
        <strong th:text="${usuario.nombre + ' ' + usuario.apellido}"></strong>
    </div>

    <div class="row g-3 mb-4">

        <div class="col-md-4">
            <div class="card text-bg-primary shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">PROYUTS acumulados</h5>
                    <p class="fs-2 mb-0" th:text="${proyutsAcumulados}"></p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-warning shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">PROYUTS faltantes</h5>
                    <p class="fs-2 mb-0" th:text="${proyutsFaltantes}"></p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-success shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Avance</h5>
                    <p class="fs-2 mb-0">
                        <span th:text="${porcentajeAvance}"></span>%
                    </p>
                </div>
            </div>
        </div>

    </div>

    <div class="progress mb-4" style="height: 25px;">
        <div class="progress-bar"
             role="progressbar"
             th:style="'width: ' + ${porcentajeAvance} + '%;'"
             th:text="${porcentajeAvance + '%'}">
        </div>
    </div>

    <div th:if="${#lists.isEmpty(cursos)}" class="alert alert-warning">
        Todavía no estás inscrito en ningún curso.
    </div>

    <div th:if="${!#lists.isEmpty(cursos)}" class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Curso</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>PROYUTS</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="curso : ${cursos}">
                        <td th:text="${curso.nombre}"></td>
                        <td th:text="${curso.descripcion}"></td>
                        <td th:text="${curso.categoria.nombre}"></td>
                        <td th:text="${curso.estado.nombre}"></td>
                        <td th:text="${curso.proyutsOtorgados}"></td>
                        <td>
                            <a th:href="@{'/mis-cursos/cancelar/' + ${curso.id}}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('¿Seguro que quieres darte de baja de este curso?')">
                                Darme de baja
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
